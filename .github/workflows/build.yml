name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DnsChanger.sln

      - name: Build
        run: dotnet build DnsChanger.sln -c Release --no-restore

      - name: Publish single-file exe
        run: >
          dotnet publish src/DnsChanger/DnsChanger.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DnsChanger-win-x64
          path: publish/DnsChanger.exe
